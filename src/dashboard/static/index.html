<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Dashboard — Windows PC Controller</title>

  <!-- Shoelace -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- Tippy.js + Popper -->
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/material.css" />

  <style>
    /* ── Custom Properties ─────────────────────────────────── */
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #334155;
      --card-radius: 12px;
      --card-padding: 1.25rem;
      --header-height: 56px;
      --button-bar-height: 64px;
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Container ─────────────────────────────────────────── */
    .container {
      max-width: 1120px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      height: var(--header-height);
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .header-title sl-icon {
      font-size: 1.25rem;
      color: var(--accent);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .status-dot.disconnected {
      background: var(--danger);
    }

    .status-dot.loading {
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main Content ──────────────────────────────────────── */
    .main {
      flex: 1;
      padding-top: 1.5rem;
      padding-bottom: calc(var(--button-bar-height) + 2rem);
    }

    /* ── Tabs ──────────────────────────────────────────────── */
    sl-tab-group {
      --indicator-color: var(--accent);
      --track-color: var(--border);
    }

    sl-tab-group::part(base) {
      background: transparent;
    }

    sl-tab-group::part(nav) {
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    sl-tab::part(base) {
      color: var(--text-muted);
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0.75rem 1rem;
      transition: color 0.2s ease;
    }

    sl-tab::part(base):hover {
      color: var(--text);
    }

    sl-tab[active]::part(base) {
      color: var(--accent);
    }

    sl-tab-panel::part(base) {
      padding: 0;
    }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: var(--card-padding);
      margin-bottom: 1rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
    }

    /* ── Button Bar ────────────────────────────────────────── */
    .button-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--button-bar-height);
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 1.5rem;
      z-index: 100;
      gap: 0.75rem;
    }

    .button-bar .container {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    /* ── Restart Banner ────────────────────────────────────── */
    .restart-banner {
      display: none;
      position: fixed;
      bottom: var(--button-bar-height);
      left: 0;
      right: 0;
      z-index: 99;
    }

    .restart-banner.visible {
      display: block;
    }

    .restart-banner sl-alert {
      border-radius: 0;
    }

    .restart-banner sl-alert::part(base) {
      border-radius: 0;
      border-left: none;
      border-right: none;
    }

    /* ── Placeholder ───────────────────────────────────────── */
    .tab-placeholder {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ── Utility ───────────────────────────────────────────── */
    .text-muted { color: var(--text-muted); }
    .text-accent { color: var(--accent); }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }

    /* ── Loading Overlay ───────────────────────────────────── */
    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
    }

    .loading-overlay sl-spinner {
      font-size: 2rem;
      --indicator-color: var(--accent);
      --track-color: var(--border);
    }

    /* ── Tools Tab: Category Cards ────────────────────────── */
    .tools-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .category-card sl-details::part(base) {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
    }

    .category-card sl-details::part(header) {
      padding: 0.875rem 1.25rem;
      font-weight: 600;
    }

    .category-card sl-details::part(content) {
      padding: 0 1.25rem 1rem;
    }

    .category-summary {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.9375rem;
    }

    .category-summary sl-icon {
      font-size: 1.125rem;
      color: var(--accent);
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 999px;
      min-width: 1.5rem;
      height: 1.375rem;
      padding: 0 0.5rem;
    }

    .category-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .tool-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.25rem;
      border-radius: 6px;
      transition: background 0.15s ease;
    }

    .tool-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .tool-row sl-switch {
      --width: 36px;
      --height: 20px;
      --thumb-size: 16px;
      flex-shrink: 0;
    }

    .tool-name {
      flex: 1;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.8125rem;
      color: var(--text);
      user-select: none;
    }

    .tool-info-icon {
      color: var(--text-muted);
      font-size: 0.9375rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    .tool-info-icon:hover {
      color: var(--accent);
    }

    /* ── Security Tab ─────────────────────────────────────── */
    .security-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.25rem;
      border-radius: 6px;
      transition: background 0.15s ease;
    }

    .setting-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .setting-row sl-switch {
      --width: 36px;
      --height: 20px;
      --thumb-size: 16px;
      flex-shrink: 0;
    }

    .setting-row sl-range {
      flex: 1;
      --tooltip-offset: 4;
    }

    .setting-label {
      flex: 1;
      font-size: 0.875rem;
      color: var(--text);
      user-select: none;
    }

    .setting-value {
      font-size: 0.8125rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      min-width: 3rem;
      text-align: right;
      flex-shrink: 0;
    }

    .setting-info-icon {
      color: var(--text-muted);
      font-size: 0.9375rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    .setting-info-icon:hover {
      color: var(--accent);
    }

    .chip-editor {
      padding: 0.375rem 0;
    }

    .chip-editor .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-bottom: 0.5rem;
      min-height: 1.5rem;
    }

    .chip-editor .chips:empty {
      margin-bottom: 0;
    }

    .chip-editor .chips sl-tag::part(base) {
      background: var(--border);
      border: none;
      color: var(--text);
      font-size: 0.8125rem;
    }

    .chip-editor .chips sl-tag::part(remove-button) {
      color: var(--text-muted);
    }

    .chip-editor .chips sl-tag::part(remove-button):hover {
      color: var(--danger);
    }

    .chip-editor sl-input {
      max-width: 300px;
    }

    .chip-editor sl-input::part(base) {
      background: transparent;
      border-color: var(--border);
    }

    .chip-editor sl-input::part(base):focus-within {
      border-color: var(--accent);
    }

    .setting-row-block {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      padding: 0.5rem 0.25rem;
    }

    .setting-row-block .setting-row-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .radio-group-row sl-radio-group {
      margin-top: 0.25rem;
    }

    .radio-group-row sl-radio-button::part(button) {
      font-size: 0.8125rem;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .container {
        padding: 0 1rem;
      }

      sl-tab::part(base) {
        font-size: 0.8125rem;
        padding: 0.625rem 0.625rem;
      }

      .card {
        padding: 1rem;
      }
    }
  </style>
</head>

<body class="sl-theme-dark">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <div class="container">
      <div class="header-title">
        <sl-icon name="gear-wide-connected"></sl-icon>
        MCP Dashboard
      </div>
      <div class="status-indicator">
        <span class="status-dot loading" id="statusDot"></span>
        <span id="statusText">Loading...</span>
      </div>
    </div>
  </header>

  <!-- ── Main Content ────────────────────────────────────── -->
  <main class="main">
    <div class="container">

      <!-- Loading state -->
      <div class="loading-overlay" id="loadingOverlay">
        <sl-spinner></sl-spinner>
      </div>

      <!-- Tab Group (hidden until config loads) -->
      <div id="dashboardContent" style="display: none;">
        <sl-tab-group id="tabGroup">
          <sl-tab slot="nav" panel="tools">
            <sl-icon name="tools" style="margin-right: 0.375rem;"></sl-icon>
            Tools
          </sl-tab>
          <sl-tab slot="nav" panel="security">
            <sl-icon name="shield-lock" style="margin-right: 0.375rem;"></sl-icon>
            Security
          </sl-tab>
          <sl-tab slot="nav" panel="rate-limits">
            <sl-icon name="speedometer2" style="margin-right: 0.375rem;"></sl-icon>
            Rate Limits
          </sl-tab>
          <sl-tab slot="nav" panel="audit-log">
            <sl-icon name="journal-text" style="margin-right: 0.375rem;"></sl-icon>
            Audit Log
          </sl-tab>

          <!-- ── Tab 1: Tools ──────────────────────────────── -->
          <sl-tab-panel name="tools">
            <div class="tools-container" id="toolsContainer">
              <!-- Populated by renderToolsTab() -->
            </div>
          </sl-tab-panel>

          <!-- ── Tab 2: Security ───────────────────────────── -->
          <sl-tab-panel name="security">
            <div class="security-container" id="securityContainer">
              <!-- Populated by renderSecurityTab() -->
            </div>
          </sl-tab-panel>

          <!-- ── Tab 3: Rate Limits ────────────────────────── -->
          <sl-tab-panel name="rate-limits">
            <!-- Rate Limits tab content (Task 7) -->
            <div class="tab-placeholder">
              Rate limit controls will appear here.
            </div>
          </sl-tab-panel>

          <!-- ── Tab 4: Audit Log ──────────────────────────── -->
          <sl-tab-panel name="audit-log">
            <!-- Audit Log tab content (Task 8) -->
            <div class="tab-placeholder">
              Audit log viewer will appear here.
            </div>
          </sl-tab-panel>
        </sl-tab-group>
      </div>

    </div>
  </main>

  <!-- ── Restart Banner ──────────────────────────────────── -->
  <div class="restart-banner" id="restartBanner">
    <sl-alert variant="warning" open>
      <sl-icon slot="icon" name="exclamation-triangle"></sl-icon>
      <strong>Restart required</strong> — Save your changes, then restart the MCP server to apply them.
    </sl-alert>
  </div>

  <!-- ── Button Bar ──────────────────────────────────────── -->
  <div class="button-bar">
    <div class="container">
      <sl-button variant="default" size="medium" id="btnReset" disabled>
        <sl-icon slot="prefix" name="arrow-counterclockwise"></sl-icon>
        Reset to Defaults
      </sl-button>
      <sl-button variant="primary" size="medium" id="btnSave" disabled>
        <sl-icon slot="prefix" name="check-lg"></sl-icon>
        Save Config
      </sl-button>
    </div>
  </div>

  <!-- ── JavaScript ──────────────────────────────────────── -->
  <script type="module">
    // ── Constants ──────────────────────────────────────────
    const API = '';

    // ── State ─────────────────────────────────────────────
    const state = {
      config: null,        // Full config from API
      dirty: false,        // Whether changes need saving
      auditOffset: 0,
      auditLimit: 100,
      auditToolFilter: '',
      auditStatusFilter: '',
      auditSearch: '',
      auditHours: 24,
    };

    // Expose state globally for tab modules (Tasks 5-8)
    window.dashboardState = state;

    // ── DOM Refs ──────────────────────────────────────────
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const dashboardContent = document.getElementById('dashboardContent');
    const restartBanner = document.getElementById('restartBanner');
    const btnSave = document.getElementById('btnSave');
    const btnReset = document.getElementById('btnReset');

    // ── Status Indicator ──────────────────────────────────
    function setStatus(type, message) {
      statusDot.className = 'status-dot';
      if (type === 'loading') statusDot.classList.add('loading');
      else if (type === 'error') statusDot.classList.add('disconnected');
      // 'connected' is the default green
      statusText.textContent = message;
    }

    // ── Dirty Tracking ────────────────────────────────────
    function markDirty() {
      state.dirty = true;
      btnSave.disabled = false;
      btnReset.disabled = false;
    }

    function markClean() {
      state.dirty = false;
      btnSave.disabled = true;
      // Reset button stays enabled if we have a user config
      btnReset.disabled = !(state.config && state.config._has_user_config);
    }

    // Expose helpers for tab modules
    window.dashboardMarkDirty = markDirty;
    window.dashboardMarkClean = markClean;

    // ── Restart Banner ────────────────────────────────────
    function showRestartBanner() {
      restartBanner.classList.add('visible');
    }

    function hideRestartBanner() {
      restartBanner.classList.remove('visible');
    }

    window.dashboardShowRestartBanner = showRestartBanner;

    // ── Load Config ───────────────────────────────────────
    async function loadConfig() {
      try {
        setStatus('loading', 'Loading...');
        const res = await fetch(`${API}/api/config`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        state.config = await res.json();

        // Show dashboard, hide loading
        loadingOverlay.style.display = 'none';
        dashboardContent.style.display = 'block';

        // Update status
        setStatus('connected', 'Connected');

        // Update reset button state
        btnReset.disabled = !state.config._has_user_config;

        // Dispatch event so tab modules can populate
        window.dispatchEvent(new CustomEvent('config-loaded', { detail: state.config }));
      } catch (err) {
        console.error('Failed to load config:', err);
        setStatus('error', 'Connection failed');
        const errDiv = document.createElement('div');
        errDiv.style.textAlign = 'center';
        errDiv.innerHTML = `
          <sl-icon name="exclamation-octagon" style="font-size: 2.5rem; color: var(--danger); margin-bottom: 1rem;"></sl-icon>
          <p style="margin-bottom: 0.5rem;">Failed to load configuration</p>
          <p class="text-muted error-msg" style="font-size: 0.875rem; margin-bottom: 1.5rem;"></p>
          <sl-button variant="primary" size="small" onclick="location.reload()">
            <sl-icon slot="prefix" name="arrow-clockwise"></sl-icon>
            Retry
          </sl-button>
        `;
        errDiv.querySelector('.error-msg').textContent = err.message;
        loadingOverlay.replaceChildren(errDiv);
      }
    }

    // ── Save Config ───────────────────────────────────────
    async function saveConfig() {
      if (!state.dirty || !state.config) return;

      try {
        btnSave.loading = true;
        setStatus('loading', 'Saving...');

        // Collect pending changes from tab modules
        const changes = {};
        window.dispatchEvent(new CustomEvent('collect-changes', { detail: changes }));

        const res = await fetch(`${API}/api/config`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(changes),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        state.config = await res.json();

        markClean();
        showRestartBanner();
        setStatus('connected', 'Saved');

        // Notify tab modules
        window.dispatchEvent(new CustomEvent('config-saved', { detail: state.config }));
      } catch (err) {
        console.error('Failed to save config:', err);
        setStatus('error', 'Save failed');
      } finally {
        btnSave.loading = false;
      }
    }

    // ── Reset Config ──────────────────────────────────────
    async function resetConfig() {
      try {
        btnReset.loading = true;
        setStatus('loading', 'Resetting...');

        const res = await fetch(`${API}/api/config/reset`, { method: 'POST' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        state.config = await res.json();

        markClean();
        hideRestartBanner();
        setStatus('connected', 'Reset to defaults');

        // Notify tab modules to re-render with defaults
        window.dispatchEvent(new CustomEvent('config-loaded', { detail: state.config }));
      } catch (err) {
        console.error('Failed to reset config:', err);
        setStatus('error', 'Reset failed');
      } finally {
        btnReset.loading = false;
      }
    }

    // Expose for tab modules
    window.dashboardLoadConfig = loadConfig;
    window.dashboardSaveConfig = saveConfig;

    // ── Event Listeners ───────────────────────────────────
    btnSave.addEventListener('click', saveConfig);

    btnReset.addEventListener('click', async () => {
      // Confirmation before reset
      const confirmed = confirm('Reset all settings to defaults? This cannot be undone.');
      if (confirmed) await resetConfig();
    });

    // Warn before leaving with unsaved changes
    window.addEventListener('beforeunload', (e) => {
      if (state.dirty) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // ── Tool Categories ───────────────────────────────────
    const TOOL_CATEGORIES = {
      'Screen':    ['capture_screenshot', 'ocr_extract_text', 'find_on_screen', 'get_pixel_color', 'list_windows'],
      'Mouse':     ['mouse_move', 'mouse_click', 'mouse_drag', 'mouse_scroll', 'mouse_position'],
      'Keyboard':  ['keyboard_type', 'keyboard_hotkey', 'keyboard_press'],
      'Gamepad':   ['gamepad_connect', 'gamepad_input', 'gamepad_disconnect'],
      'ADB':       ['adb_tap', 'adb_swipe', 'adb_key_event', 'adb_shell'],
      'System':    ['launch_app', 'focus_window', 'close_window', 'get_system_info'],
      'Clipboard': ['clipboard_read', 'clipboard_write'],
    };

    const CATEGORY_ICONS = {
      'Screen':    'display',
      'Mouse':     'mouse',
      'Keyboard':  'keyboard',
      'Gamepad':   'controller',
      'ADB':       'phone',
      'System':    'pc-display',
      'Clipboard': 'clipboard',
    };

    // Expose for other tab modules
    window.TOOL_CATEGORIES = TOOL_CATEGORIES;

    // ── Tools Tab Renderer ─────────────────────────────────
    function renderToolsTab() {
      const container = document.getElementById('toolsContainer');
      container.replaceChildren();

      const tools = state.config?.tools ?? {};

      for (const [category, toolNames] of Object.entries(TOOL_CATEGORIES)) {
        const icon = CATEGORY_ICONS[category] || 'tools';
        const enabledCount = toolNames.filter(n => tools[n]?.enabled ?? true).length;

        // Category card wrapper
        const card = document.createElement('div');
        card.className = 'category-card';

        // sl-details element
        const details = document.createElement('sl-details');
        details.open = true;

        // Summary content (built with DOM API — no innerHTML)
        const summary = document.createElement('div');
        summary.className = 'category-summary';
        summary.slot = 'summary';
        const iconEl = document.createElement('sl-icon');
        iconEl.name = icon;
        summary.appendChild(iconEl);
        const nameSpan = document.createElement('span');
        nameSpan.textContent = category;
        summary.appendChild(nameSpan);
        const badge = document.createElement('span');
        badge.className = 'category-badge';
        badge.dataset.category = category;
        badge.textContent = `${enabledCount}/${toolNames.length}`;
        summary.appendChild(badge);
        details.appendChild(summary);

        // Content: actions bar + tool list
        const content = document.createElement('div');

        // Enable All / Disable All buttons
        const actions = document.createElement('div');
        actions.className = 'category-actions';

        const enableAllBtn = document.createElement('sl-button');
        enableAllBtn.variant = 'default';
        enableAllBtn.size = 'small';
        enableAllBtn.textContent = 'Enable All';
        enableAllBtn.addEventListener('click', () => {
          setCategoryEnabled(category, toolNames, true);
        });

        const disableAllBtn = document.createElement('sl-button');
        disableAllBtn.variant = 'default';
        disableAllBtn.size = 'small';
        disableAllBtn.textContent = 'Disable All';
        disableAllBtn.addEventListener('click', () => {
          setCategoryEnabled(category, toolNames, false);
        });

        actions.appendChild(enableAllBtn);
        actions.appendChild(disableAllBtn);
        content.appendChild(actions);

        // Tool rows
        const toolList = document.createElement('div');
        toolList.className = 'tool-list';

        for (const toolName of toolNames) {
          const enabled = tools[toolName]?.enabled ?? true;

          const row = document.createElement('div');
          row.className = 'tool-row';

          const toggle = document.createElement('sl-switch');
          toggle.checked = enabled;
          toggle.dataset.tool = toolName;
          toggle.addEventListener('sl-change', () => {
            onToolToggle(toolName, toggle.checked, category, toolNames);
          });

          const label = document.createElement('span');
          label.className = 'tool-name';
          label.textContent = toolName;

          const infoIcon = document.createElement('sl-icon');
          infoIcon.className = 'tool-info-icon';
          infoIcon.name = 'info-circle';
          infoIcon.dataset.help = `tools.${toolName}`;

          row.appendChild(toggle);
          row.appendChild(label);
          row.appendChild(infoIcon);
          toolList.appendChild(row);
        }

        content.appendChild(toolList);
        details.appendChild(content);
        card.appendChild(details);
        container.appendChild(card);
      }
    }

    function onToolToggle(toolName, enabled, category, toolNames) {
      // Ensure tools map exists
      if (!state.config.tools) state.config.tools = {};
      if (!state.config.tools[toolName]) state.config.tools[toolName] = {};
      state.config.tools[toolName].enabled = enabled;

      // Update badge count
      updateCategoryBadge(category, toolNames);
      markDirty();
    }

    function setCategoryEnabled(category, toolNames, enabled) {
      if (!state.config.tools) state.config.tools = {};

      for (const toolName of toolNames) {
        if (!state.config.tools[toolName]) state.config.tools[toolName] = {};
        state.config.tools[toolName].enabled = enabled;

        // Update the switch in the DOM (scoped to tools container)
        const container = document.getElementById('toolsContainer');
        const toggle = container.querySelector(`sl-switch[data-tool="${toolName}"]`);
        if (toggle) toggle.checked = enabled;
      }

      updateCategoryBadge(category, toolNames);
      markDirty();
    }

    function updateCategoryBadge(category, toolNames) {
      const tools = state.config?.tools ?? {};
      const enabledCount = toolNames.filter(n => tools[n]?.enabled ?? true).length;
      const badge = document.querySelector(`.category-badge[data-category="${category}"]`);
      if (badge) badge.textContent = `${enabledCount}/${toolNames.length}`;
    }

    // ── Collect Changes: Tools ─────────────────────────────
    window.addEventListener('collect-changes', (e) => {
      if (state.config?.tools) {
        e.detail.tools = state.config.tools;
      }
    });

    // ── Listen for config-loaded (Tools) ───────────────────
    window.addEventListener('config-loaded', () => {
      renderToolsTab();
    });

    // ── Security Tab ─────────────────────────────────────

    /**
     * Create an info icon element with a data-help attribute.
     * @param {string} helpPath - The config path for help tooltip
     * @returns {HTMLElement}
     */
    function createInfoIcon(helpPath) {
      const icon = document.createElement('sl-icon');
      icon.className = 'setting-info-icon';
      icon.name = 'info-circle';
      icon.dataset.help = helpPath;
      return icon;
    }

    /**
     * Create a setting row with a switch toggle.
     * @param {string} label - Display label
     * @param {string} helpPath - Config path for help
     * @param {boolean} checked - Initial state
     * @param {function} onChange - Callback on toggle
     * @returns {HTMLElement}
     */
    function createSwitchRow(label, helpPath, checked, onChange) {
      const row = document.createElement('div');
      row.className = 'setting-row';

      const toggle = document.createElement('sl-switch');
      toggle.checked = checked;
      toggle.addEventListener('sl-change', () => {
        onChange(toggle.checked);
        markDirty();
      });

      const labelEl = document.createElement('span');
      labelEl.className = 'setting-label';
      labelEl.textContent = label;

      row.appendChild(toggle);
      row.appendChild(labelEl);
      row.appendChild(createInfoIcon(helpPath));
      return row;
    }

    /**
     * Create a setting row with a range slider.
     * @param {string} label - Display label
     * @param {string} helpPath - Config path for help
     * @param {number} value - Current value
     * @param {number} min - Minimum value
     * @param {number} max - Maximum value
     * @param {number} step - Step increment
     * @param {string} suffix - Unit suffix (e.g. "s", "chars")
     * @param {function} onChange - Callback with new value
     * @returns {HTMLElement}
     */
    function createRangeRow(label, helpPath, value, min, max, step, suffix, onChange) {
      const row = document.createElement('div');
      row.className = 'setting-row';

      const labelEl = document.createElement('span');
      labelEl.className = 'setting-label';
      labelEl.textContent = label;

      const range = document.createElement('sl-range');
      range.min = min;
      range.max = max;
      range.step = step;
      range.value = value;
      range.tooltip = 'top';

      const valueDisplay = document.createElement('span');
      valueDisplay.className = 'setting-value';
      valueDisplay.textContent = `${value}${suffix}`;

      range.addEventListener('sl-input', () => {
        valueDisplay.textContent = `${range.value}${suffix}`;
      });
      range.addEventListener('sl-change', () => {
        valueDisplay.textContent = `${range.value}${suffix}`;
        onChange(Number(range.value));
        markDirty();
      });

      row.appendChild(labelEl);
      row.appendChild(range);
      row.appendChild(valueDisplay);
      row.appendChild(createInfoIcon(helpPath));
      return row;
    }

    /**
     * Create a reusable chip editor for list-type config values.
     * @param {string} configPath - Dot-separated config path (e.g. "security.masking.blocked_apps")
     * @param {string[]} items - Current list of items
     * @param {function} onUpdate - Called with updated array on add/remove
     * @returns {HTMLElement}
     */
    function createChipEditor(configPath, items, onUpdate) {
      const wrapper = document.createElement('div');
      wrapper.className = 'chip-editor';
      wrapper.dataset.path = configPath;

      const chipsContainer = document.createElement('div');
      chipsContainer.className = 'chips';

      // Track current items
      let currentItems = [...items];

      function renderChips() {
        chipsContainer.replaceChildren();
        for (const item of currentItems) {
          const tag = document.createElement('sl-tag');
          tag.variant = 'neutral';
          tag.size = 'medium';
          tag.removable = true;
          tag.textContent = item;
          tag.addEventListener('sl-remove', () => {
            currentItems = currentItems.filter(i => i !== item);
            renderChips();
            onUpdate(currentItems);
            markDirty();
          });
          chipsContainer.appendChild(tag);
        }
      }

      renderChips();

      const input = document.createElement('sl-input');
      input.placeholder = 'Add item...';
      input.size = 'small';

      const addIcon = document.createElement('sl-icon');
      addIcon.name = 'plus-circle';
      addIcon.slot = 'suffix';
      addIcon.style.cursor = 'pointer';
      input.appendChild(addIcon);

      function addItem() {
        const val = input.value.trim();
        if (val && !currentItems.includes(val)) {
          currentItems.push(val);
          renderChips();
          onUpdate(currentItems);
          markDirty();
        }
        input.value = '';
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addItem();
        }
      });

      addIcon.addEventListener('click', addItem);

      wrapper.appendChild(chipsContainer);
      wrapper.appendChild(input);
      return wrapper;
    }

    /**
     * Create a card with title and content.
     * @param {string} title - Card title
     * @param {string} iconName - Shoelace icon name
     * @returns {{ card: HTMLElement, body: HTMLElement }}
     */
    function createSecurityCard(title, iconName) {
      const card = document.createElement('div');
      card.className = 'card';

      const header = document.createElement('div');
      header.className = 'card-header';

      const titleEl = document.createElement('span');
      titleEl.className = 'card-title';

      const titleIcon = document.createElement('sl-icon');
      titleIcon.name = iconName;
      titleIcon.style.marginRight = '0.5rem';
      titleIcon.style.color = 'var(--accent)';
      titleEl.appendChild(titleIcon);

      const titleText = document.createTextNode(title);
      titleEl.appendChild(titleText);

      header.appendChild(titleEl);

      const body = document.createElement('div');
      body.className = 'card-body';

      card.appendChild(header);
      card.appendChild(body);
      return { card, body };
    }

    /**
     * Render the entire Security tab from state.config.security.
     */
    function renderSecurityTab() {
      const container = document.getElementById('securityContainer');
      container.replaceChildren();

      const sec = state.config?.security;
      if (!sec) return;

      // ── Card 1: General Security ──────────────────────
      {
        const { card, body } = createSecurityCard('General Security', 'shield-check');

        body.appendChild(createSwitchRow(
          'Security Enabled (master toggle)',
          'security.enabled',
          sec.enabled,
          (val) => { state.config.security.enabled = val; }
        ));

        body.appendChild(createSwitchRow(
          'Confirm Dangerous Actions',
          'security.confirm_dangerous_actions',
          sec.confirm_dangerous_actions,
          (val) => { state.config.security.confirm_dangerous_actions = val; }
        ));

        body.appendChild(createRangeRow(
          'Confirmation Timeout',
          'security.confirmation_timeout_seconds',
          sec.confirmation_timeout_seconds,
          10, 300, 5, 's',
          (val) => { state.config.security.confirmation_timeout_seconds = val; }
        ));

        body.appendChild(createSwitchRow(
          'Audit Logging',
          'security.audit_logging',
          sec.audit_logging,
          (val) => { state.config.security.audit_logging = val; }
        ));

        container.appendChild(card);
      }

      // ── Card 2: Screen Masking ────────────────────────
      {
        const { card, body } = createSecurityCard('Screen Masking', 'eye-slash');
        const masking = sec.masking || {};

        body.appendChild(createSwitchRow(
          'Masking Enabled',
          'security.masking.enabled',
          masking.enabled ?? true,
          (val) => { state.config.security.masking.enabled = val; }
        ));

        body.appendChild(createSwitchRow(
          'Mask Password Fields',
          'security.masking.mask_password_fields',
          masking.mask_password_fields ?? true,
          (val) => { state.config.security.masking.mask_password_fields = val; }
        ));

        // Blocked apps chip editor
        const blockedAppsBlock = document.createElement('div');
        blockedAppsBlock.className = 'setting-row-block';
        const blockedAppsHeader = document.createElement('div');
        blockedAppsHeader.className = 'setting-row-header';
        const blockedAppsLabel = document.createElement('span');
        blockedAppsLabel.className = 'setting-label';
        blockedAppsLabel.textContent = 'Blocked Apps';
        blockedAppsHeader.appendChild(blockedAppsLabel);
        blockedAppsHeader.appendChild(createInfoIcon('security.masking.blocked_apps'));
        blockedAppsBlock.appendChild(blockedAppsHeader);
        blockedAppsBlock.appendChild(createChipEditor(
          'security.masking.blocked_apps',
          masking.blocked_apps || [],
          (items) => { state.config.security.masking.blocked_apps = items; }
        ));
        body.appendChild(blockedAppsBlock);

        container.appendChild(card);
      }

      // ── Card 3: Keyboard Security ─────────────────────
      {
        const { card, body } = createSecurityCard('Keyboard Security', 'keyboard');
        const kb = sec.keyboard || {};

        // Blocked hotkeys chip editor
        const hotkeyBlock = document.createElement('div');
        hotkeyBlock.className = 'setting-row-block';
        const hotkeyHeader = document.createElement('div');
        hotkeyHeader.className = 'setting-row-header';
        const hotkeyLabel = document.createElement('span');
        hotkeyLabel.className = 'setting-label';
        hotkeyLabel.textContent = 'Blocked Hotkeys';
        hotkeyHeader.appendChild(hotkeyLabel);
        hotkeyHeader.appendChild(createInfoIcon('security.keyboard.blocked_hotkeys'));
        hotkeyBlock.appendChild(hotkeyHeader);
        hotkeyBlock.appendChild(createChipEditor(
          'security.keyboard.blocked_hotkeys',
          kb.blocked_hotkeys || [],
          (items) => { state.config.security.keyboard.blocked_hotkeys = items; }
        ));
        body.appendChild(hotkeyBlock);

        body.appendChild(createRangeRow(
          'Max Type Length',
          'security.keyboard.max_type_length',
          kb.max_type_length ?? 500,
          50, 2000, 50, ' chars',
          (val) => { state.config.security.keyboard.max_type_length = val; }
        ));

        body.appendChild(createSwitchRow(
          'Block Password Fields',
          'security.keyboard.block_password_fields',
          kb.block_password_fields ?? true,
          (val) => { state.config.security.keyboard.block_password_fields = val; }
        ));

        container.appendChild(card);
      }

      // ── Card 4: App Execution ─────────────────────────
      {
        const { card, body } = createSecurityCard('App Execution', 'terminal');
        const apps = sec.apps || {};

        // Mode radio group
        const modeBlock = document.createElement('div');
        modeBlock.className = 'setting-row radio-group-row';

        const modeLabel = document.createElement('span');
        modeLabel.className = 'setting-label';
        modeLabel.textContent = 'Execution Mode';

        const radioGroup = document.createElement('sl-radio-group');
        radioGroup.value = apps.mode || 'allowlist';
        radioGroup.dataset.help = 'security.apps.mode';

        const allowRadio = document.createElement('sl-radio-button');
        allowRadio.value = 'allowlist';
        allowRadio.size = 'small';
        allowRadio.textContent = 'Allowlist';

        const blockRadio = document.createElement('sl-radio-button');
        blockRadio.value = 'blocklist';
        blockRadio.size = 'small';
        blockRadio.textContent = 'Blocklist';

        radioGroup.appendChild(allowRadio);
        radioGroup.appendChild(blockRadio);

        radioGroup.addEventListener('sl-change', () => {
          state.config.security.apps.mode = radioGroup.value;
          markDirty();
        });

        modeBlock.appendChild(modeLabel);
        modeBlock.appendChild(radioGroup);
        modeBlock.appendChild(createInfoIcon('security.apps.mode'));
        body.appendChild(modeBlock);

        // Allowed apps chip editor
        const allowedBlock = document.createElement('div');
        allowedBlock.className = 'setting-row-block';
        const allowedHeader = document.createElement('div');
        allowedHeader.className = 'setting-row-header';
        const allowedLabel = document.createElement('span');
        allowedLabel.className = 'setting-label';
        allowedLabel.textContent = 'Allowed Apps';
        allowedHeader.appendChild(allowedLabel);
        allowedHeader.appendChild(createInfoIcon('security.apps.allowed'));
        allowedBlock.appendChild(allowedHeader);
        allowedBlock.appendChild(createChipEditor(
          'security.apps.allowed',
          apps.allowed || [],
          (items) => { state.config.security.apps.allowed = items; }
        ));
        body.appendChild(allowedBlock);

        container.appendChild(card);
      }

      // ── Card 5: ADB Security ──────────────────────────
      {
        const { card, body } = createSecurityCard('ADB Security', 'phone');
        const adb = sec.adb || {};

        // Allowed devices
        const devicesBlock = document.createElement('div');
        devicesBlock.className = 'setting-row-block';
        const devicesHeader = document.createElement('div');
        devicesHeader.className = 'setting-row-header';
        const devicesLabel = document.createElement('span');
        devicesLabel.className = 'setting-label';
        devicesLabel.textContent = 'Allowed Devices';
        devicesHeader.appendChild(devicesLabel);
        devicesHeader.appendChild(createInfoIcon('security.adb.allowed_devices'));
        devicesBlock.appendChild(devicesHeader);
        devicesBlock.appendChild(createChipEditor(
          'security.adb.allowed_devices',
          adb.allowed_devices || [],
          (items) => { state.config.security.adb.allowed_devices = items; }
        ));
        body.appendChild(devicesBlock);

        // Allowed commands
        const cmdsBlock = document.createElement('div');
        cmdsBlock.className = 'setting-row-block';
        const cmdsHeader = document.createElement('div');
        cmdsHeader.className = 'setting-row-header';
        const cmdsLabel = document.createElement('span');
        cmdsLabel.className = 'setting-label';
        cmdsLabel.textContent = 'Allowed Commands';
        cmdsHeader.appendChild(cmdsLabel);
        cmdsHeader.appendChild(createInfoIcon('security.adb.allowed_commands'));
        cmdsBlock.appendChild(cmdsHeader);
        cmdsBlock.appendChild(createChipEditor(
          'security.adb.allowed_commands',
          adb.allowed_commands || [],
          (items) => { state.config.security.adb.allowed_commands = items; }
        ));
        body.appendChild(cmdsBlock);

        container.appendChild(card);
      }

      // ── Card 6: Clipboard ─────────────────────────────
      {
        const { card, body } = createSecurityCard('Clipboard', 'clipboard');
        const clip = sec.clipboard || {};

        body.appendChild(createSwitchRow(
          'Read Enabled',
          'security.clipboard.read_enabled',
          clip.read_enabled ?? false,
          (val) => { state.config.security.clipboard.read_enabled = val; }
        ));

        body.appendChild(createSwitchRow(
          'Write Enabled',
          'security.clipboard.write_enabled',
          clip.write_enabled ?? true,
          (val) => { state.config.security.clipboard.write_enabled = val; }
        ));

        container.appendChild(card);
      }
    }

    // ── Collect Changes: Security ──────────────────────────
    window.addEventListener('collect-changes', (e) => {
      if (state.config?.security) {
        e.detail.security = state.config.security;
      }
    });

    // ── Listen for config-loaded (Security) ────────────────
    window.addEventListener('config-loaded', () => {
      renderSecurityTab();
    });

    // ── Init ──────────────────────────────────────────────
    // Module scripts are deferred — DOM is already ready when this runs
    loadConfig();
  </script>

</body>
</html>
